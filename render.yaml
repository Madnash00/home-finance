services:
  - type: web
    name: home-finance
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /data
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        generateValue: true
      - key: DRIVE_AUTO_BACKUP
        value: false
    disk:
      name: home-finance-data
      mountPath: /data
      sizeGB: 1
